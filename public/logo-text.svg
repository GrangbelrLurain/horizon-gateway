<svg viewBox="0 0 280 40" width="280" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle glow filter -->
    <filter id="subtleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600&amp;display=swap');
      .brand-text {
        font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 15px;
        fill: #E2E8F0; /* Clean Slate/Platinum White */
        letter-spacing: 4.5px; /* Wide tracking for premium tech aesthetic */
      }
      .text-left {
        text-anchor: end; /* Align right edge of HORIZON to x-coordinate */
      }
      .text-right {
        text-anchor: start; /* Align left edge of GATEWAY to x-coordinate */
      }
      .logo-icon-rhombus {
        stroke: #E2E8F0;
        stroke-width: 1.2;
        fill: none;
        opacity: 0.5;
      }
      .logo-icon-ring {
        stroke: #38BDF8; /* Minimal icy blue accent */
        stroke-width: 1;
        fill: none;
        opacity: 0.4;
      }
      .logo-icon-core {
        fill: #FFFFFF;
      }
      .logo-icon-glow {
        fill: #38BDF8;
        opacity: 0.35;
        filter: url(#subtleGlow);
      }
    </style>
  </defs>

  <!-- Left Side: HORIZON (Ends exactly at x=124) -->
  <text x="124" y="25" class="brand-text text-left">HORIZON</text>

  <!-- Center: Refined Micro Core Icon (Centered exactly at x=140, bounds at 128-152) -->
  <g id="micro-logo-icon">
    <!-- Rhombus base outline -->
    <path d="M 140 10 L 150 20 L 140 30 L 130 20 Z" class="logo-icon-rhombus" />
    
    <!-- Tilted orbit ring -->
    <ellipse cx="140" cy="20" rx="12" ry="3.5" class="logo-icon-ring" transform="rotate(-15 140 20)" />
    
    <!-- Minimal core light -->
    <circle cx="140" cy="20" r="3.5" class="logo-icon-glow" />
    <circle cx="140" cy="20" r="1.2" class="logo-icon-core" />
  </g>

  <!-- Right Side: GATEWAY (Starts exactly at x=160) -->
  <text x="160" y="25" class="brand-text text-right">GATEWAY</text>
</svg>
