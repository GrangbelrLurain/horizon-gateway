name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'CHANGELOG.md'
      - 'public/**'
      - 'app-icon.svg'
      - '.github/workflows/deploy-web.yml'
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch: # Allow manual trigger

# Allow only one concurrent deployment, skipping runs in-progress but not active
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Run only if pushed directly or if the Release workflow succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'website/package.json'

      - name: Sync Logos
        run: node scripts/sync-logos.mjs

      - name: Install Website Dependencies
        working-directory: website
        run: pnpm install --no-frozen-lockfile

      - name: Build Website
        working-directory: website
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          command: pages deploy dist --project-name=horizon-gateway --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
