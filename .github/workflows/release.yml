name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  # 1. Draft Release를 딱 '한 번만' 먼저 생성하는 잡
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # 푸시된 태그 이름을 사용하여 Draft를 만듭니다.
          tag_name: ${{ github.ref_name }}
          name: "Horizon Gateway v${{ github.ref_name }}"
          body: "See the assets below to download the latest version of Horizon Gateway."
          draft: true
          prerelease: false

  # 2. 빌드 및 에셋 업로드 (매트릭스)
  publish:
    needs: create-release # 릴리스 생성이 완료될 때까지 대기
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 1. pnpm 설치 (새로 추가된 부분!)
      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.26.0

      # 2. Node.js 설정 및 pnpm 캐시 활성화
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # 매번 다운로드하지 않도록 캐싱 추가

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # 3. 이제 정상적으로 실행됩니다!
      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          # 중요: 위에서 생성된 Release ID를 그대로 사용합니다.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}