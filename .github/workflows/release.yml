name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  # 1. Draft Release를 딱 '한 번만' 먼저 생성하는 잡
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # 푸시된 태그 이름을 사용하여 Draft를 만듭니다.
          tag_name: ${{ github.ref_name }}
          name: "Watchtower v${{ github.ref_name }}"
          body: "See the assets below to download the latest version of Watchtower."
          draft: true
          prerelease: false

  # 2. 빌드 및 에셋 업로드 (매트릭스)
  publish:
    needs: create-release # 릴리스 생성이 완료될 때까지 대기
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: pnpm install # 또는 npm install (사용하시는 패키지 매니저에 맞춰 수정)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 중요: 위에서 생성된 Release ID를 그대로 사용합니다.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}