<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: Deep Space Blue/Dark Slate -->
    <radialGradient id="voidBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0F172A" /> <!-- Slate 900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- Slate 950 -->
    </radialGradient>

    <!-- Energy Field / Anti-gravity Beam Gradient: Cyan -->
    <linearGradient id="energyBeam" x1="512" y1="100" x2="512" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0" />
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0" />
    </linearGradient>

    <!-- The Core Glowing Eye Gradient: Electric Cyan / White -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ECFEFF" /> <!-- Cyan 50 -->
      <stop offset="25%" stop-color="#67E8F9" /> <!-- Cyan 300 -->
      <stop offset="60%" stop-color="#06B6D4" /> <!-- Cyan 500 -->
      <stop offset="100%" stop-color="#083344" stop-opacity="0" /> <!-- Cyan 950 -->
    </radialGradient>
    
    <radialGradient id="pureLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#A5F3FC" /> <!-- Cyan 200 -->
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0" />
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Void Background -->
  <rect width="1024" height="1024" fill="url(#voidBg)" />

  <!-- Magnetic Field (Background) -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.15" stroke-dasharray="4 12" />
  <circle cx="512" cy="512" r="320" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.2" stroke-dasharray="10 30" />
  <path d="M 512 80 L 512 944" stroke="url(#energyBeam)" stroke-width="4" filter="url(#neonGlow)" opacity="0.7" />

  <!-- Holographic Rhombus Base Layer (Centered) -->
  <g filter="url(#neonGlow)">
    <!-- Outer Rhombus -->
    <path d="M 512 180 L 844 512 L 512 844 L 180 512 Z" fill="#0284C7" fill-opacity="0.08" stroke="#22D3EE" stroke-width="8" />
    <!-- Inner Rhombus detail -->
    <path d="M 512 240 L 784 512 L 512 784 L 240 512 Z" fill="none" stroke="#38BDF8" stroke-width="3" opacity="0.5" />
  </g>

  <!-- Orbiting Rings (Centered) -->
  <g filter="url(#neonGlow)">
    <ellipse cx="512" cy="512" rx="380" ry="100" fill="none" stroke="#22D3EE" stroke-width="6" opacity="0.45" transform="rotate(-15 512 512)" />
    <ellipse cx="512" cy="512" rx="420" ry="70" fill="none" stroke="#0EA5E9" stroke-width="3" opacity="0.3" transform="rotate(10 512 512)" />
  </g>

  <!-- The Antigravity Core (Centered inside the Rhombus) -->
  <g filter="url(#neonGlow)">
    <circle cx="512" cy="512" r="150" fill="url(#coreGlow)" opacity="0.85" />
    <circle cx="512" cy="512" r="65" fill="url(#pureLight)" />
    <circle cx="512" cy="512" r="22" fill="#FFFFFF" />
  </g>

  <!-- Floating Circular Particles -->
  <circle cx="280" cy="300" r="16" fill="#22D3EE" filter="url(#neonGlow)" opacity="0.8" />
  <circle cx="740" cy="280" r="12" fill="#0EA5E9" filter="url(#neonGlow)" opacity="0.7" />
  <circle cx="780" cy="650" r="14" fill="#38BDF8" filter="url(#neonGlow)" opacity="0.9" />
  <circle cx="230" cy="680" r="18" fill="#06B6D4" filter="url(#neonGlow)" opacity="0.6" />
</svg>